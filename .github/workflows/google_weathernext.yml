name: Invio Grafico Profilo Google WeatherNext 2

on:
  schedule:
    # Esegue al minuto 35 ogni 2 ore
    - cron: '35 */2 * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_grafico:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script Grafico Google
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python google_weathernext.py

      - name: Salva il file hash dei dati (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultimo_hash_google_weathernext.txt || true
          git commit -m "Aggiornamento hash dati Google WNX2 [skip ci]" || echo "Nessun nuovo run Google"
          git push