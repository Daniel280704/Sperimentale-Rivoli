name: Generate ICON-CH2 ENS Maps

on:
  schedule:
    - cron: '15 2,8,14,20 * * *' # Schedulazione allineata indicativamente con i run ICON
  workflow_dispatch:

jobs:
  build_and_plot:
    runs-on: ubuntu-latest
    
    # IMPORTANTE: Necessario per far funzionare correttamente l'ambiente Conda negli step "run"
    defaults:
      run:
        shell: bash -l {0}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: meteo-env
          python-version: "3.10"
          channels: conda-forge, defaults
          channel-priority: strict
          auto-activate-base: false

      - name: Install Metview and Dependencies via Conda
        # L'installazione da conda-forge scarica i binari corretti (metview-batch) e i binding Python (metview-python)
        run: |
          conda install -y -c conda-forge metview-batch metview-python eccodes requests numpy pandas matplotlib

      - name: Clone COSMO and ECMWF GRIB Definitions
        run: |
          mkdir -p grib_definitions
          cd grib_definitions
          git clone https://github.com/COSMO-ORG/eccodes-cosmo-resources.git
          git clone https://github.com/ecmwf/eccodes.git
          cd ..

      - name: Run ICON-CH2 Mapping Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # Set the GRIB format local definitions of the COSMO consortium
          GRIB_DEFINITION_PATH: ${{ github.workspace }}/grib_definitions/eccodes-cosmo-resources/definitions:${{ github.workspace }}/grib_definitions/eccodes/definitions
        run: |
          python icon_ch2_ens_map.py
