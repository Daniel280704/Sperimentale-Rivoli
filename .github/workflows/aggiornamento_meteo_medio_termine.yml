name: Aggiornamento meteo a medio termine

on:
  schedule:
    # Esegue alle 05:39 UTC (le 07:39 in Italia) i giorni 1 (Lunedì) e 4 (Giovedì)
    #- cron: '39 5 * * 1,4'
  workflow_dispatch:

jobs:
  invia_tendenza:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: pip install requests google-generativeai

      - name: Esegui Script Tendenza
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python aggiornamento_meteo_medio_termine.py
