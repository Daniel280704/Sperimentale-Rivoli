name: Bollettino Agronomico Mattutino

on:
  schedule:
    # Gira una volta al giorno alle 06:30 Italiane (04:30 UTC)
    - cron: '30 4 * * *'
  workflow_dispatch: 

jobs:
  bollettino_orto:
    runs-on: ubuntu-latest

    steps:
      - name: Estrazione del Codice Sorgente
        uses: actions/checkout@v3

      - name: Setup di Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installazione librerie
        run: pip install requests

      - name: Genera e Invia Bollettino
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python bot_orto.py
