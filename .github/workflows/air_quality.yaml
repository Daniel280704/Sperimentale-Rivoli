name: Invio Grafico Qualità Aria

on:
  schedule:
    # Esegue al minuto 55 ogni 2 ore, ben sfalsato dagli altri workflow meteo
    - cron: '55 */2 * * *'
  workflow_dispatch:

jobs:
  genera_e_invia_aria:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script Qualità Aria
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python air_quality.py

      - name: Salva il file hash dei dati
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultimo_hash_air_quality.txt || true
          git commit -m "Aggiornamento hash qualità aria [skip ci]" || echo "Nessun nuovo run aria"
          git push