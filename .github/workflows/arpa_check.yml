name: Controllo Allerte ARPA

on:
  schedule:
    # 13:00 ora locale = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch: 

jobs:
  controllo_arpa:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests feedparser

      - name: Esegui Script Allerta ARPA
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python arpa_allerta.py

      - name: Salva stato ultima allerta
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Aggiornato stato ultima allerta ARPA"
          file_pattern: last_alert.txt