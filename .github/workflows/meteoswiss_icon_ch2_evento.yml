name: MeteoSvizzera ICON-CH2 Prime 24h

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-meteoswiss-icon-ch2-24h:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnetcdf-dev libnetcdff-dev libgl1

      - name: Install Conda and Metview
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: '3.10'
          channels: conda-forge,defaults
          channel-priority: strict
          activate-environment: icon-env

      - name: Install Python Packages
        shell: bash -el {0}
        run: |
          conda install -c conda-forge metview metview-python requests pandas numpy eccodes

      - name: Download COSMO/ICON GRIB Definitions
        run: git clone https://github.com/COSMO-ORG/eccodes-cosmo-resources.git

      - name: Esecuzione Script Pluviometrico
        shell: bash -el {0}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # 1. Imposta la variabile d'ambiente per leggere i file Svizzeri
          export GRIB_DEFINITION_PATH="${{ github.workspace }}/eccodes-cosmo-resources/definitions:$CONDA_PREFIX/share/eccodes/definitions"
          
          # 2. Diagnostica: confermiamo che ecCodes veda entrambe le cartelle
          echo "Checking ecCodes definitions..."
          codes_info
          
          # 3. Lancio dello script
          python meteoswiss_icon_ch2_evento.py

      - name: Commit e Push Tracking Run
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add ultima_ora_icon_ch2_evento.txt
          git diff --quiet && git diff --staged --quiet || (git commit -m "Aggiornamento tracker RUN Prime 24h ICON-CH2" && git push)