name: ECMWF Piemonte Pioggia ENS Mean

on:
  workflow_dispatch: # Permette l'avvio manuale dal pannello Actions

jobs:
  run-ecmwf-piemonte-pioggia-ens:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnetcdf-dev libnetcdff-dev libgl1

      - name: Install Conda and Metview
        uses: conda-incubator/setup-miniconda@v2
        with:
          auto-update-conda: true
          python-version: '3.10'
          channels: conda-forge,defaults
          channel-priority: strict
          activate-environment: ecmwf-env

      - name: Install Python Packages
        shell: bash -el {0}
        run: |
          conda install -c conda-forge metview metview-python ecmwf-opendata requests

      - name: Run Script e Invia a Telegram
        shell: bash -el {0}
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python ecmwf_pioggia_ens_mean.py