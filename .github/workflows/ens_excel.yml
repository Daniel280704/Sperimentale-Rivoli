name: ENS Rivoli (Solo Excel)

on:
  schedule:
    # Orari in UTC (CEST - 2 ore). 
    - cron: '23 * * * *'
  workflow_dispatch: 

jobs:
  crea_e_invia_dati_excel:
    runs-on: ubuntu-latest
    
    # Autorizzazione fondamentale per permettere al bot di salvare eventuali log
    permissions:
      contents: write

    steps:
      - name: Estrazione del Codice Sorgente
        uses: actions/checkout@v3

      - name: Setup di Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installazione delle librerie
        # Rimosso matplotlib, tenuti solo quelli necessari per l'Excel
        run: pip install requests pandas openpyxl

      - name: Generazione Dati Excel e Invio a Telegram
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # --- DATI TABELLARI EXCEL ---
          python ens_excel.py --modello ch1
          python ens_excel.py --modello ch2
          python ens_excel.py --modello d2