name: Analisi temporali semplice

on:
  schedule:
    # Esegue al minuto 12 dalle 07:12 UTC alle 18:12 UTC
    # Con l'ora legale italiana (UTC+2) corrisponde alla fascia oraria 09:12 - 20:12
    # Il "3-10" indica la validità da Marzo a Ottobre.
    - cron: '12 7-18 * 3-10 *'
  
  workflow_dispatch: # Permette l'avvio manuale dal sito

jobs:
  allerta_convettiva:
    runs-on: ubuntu-latest
    permissions:
      contents: write # FONDAMENTALE: Consente di committare il file semaforo .txt

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests groq

      - name: Esegui Script Analisi Temporali
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python analisi_fenomenologia_temporalesca_semplice.py

      - name: Salva il file semaforo temporali (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add lock_temporali_semplice.txt || true
          git commit -m "Aggiornamento semaforo analisi temporali semplice [skip ci]" || echo "Nessun semaforo da aggiornare"
          git pull --rebase origin main
          git push
