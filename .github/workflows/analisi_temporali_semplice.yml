name: Analisi Temporali (Stile ESTOFEX)

on:
  schedule:
    # Esegue tutti i giorni alle 06:00 UTC (le 08:00 in Italia)
    # Il "4-9" indica che girerà SOLO da Aprile a Settembre.
    - cron: '0 6 * 3-10 *'
  
  # workflow_dispatch permette di far partire lo script manualmente tramite il pulsante "Run workflow" su GitHub
  workflow_dispatch: 

jobs:
  allerta_convettiva:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Aggiornato a Python 3.11

      - name: Installa dipendenze
        # Sostituito il vecchio SDK con il nuovo "google-genai"
        run: pip install requests google-genai

      - name: Esegui Script Analisi Temporali
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python analisi_temporali_d2_semplice.py
