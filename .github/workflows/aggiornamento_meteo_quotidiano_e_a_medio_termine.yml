name: Aggiornamento meteo quotidiano e a medio termine

on:
  schedule:
    # Attenzione: GitHub Action lavora sul fuso orario UTC. 
    # 1, 2, 3, 4, 5, 6 UTC corrispondono a 03:39, 04:39, 05:39, 06:39, 07:39 e 08:39 ora italiana (CEST).
    - cron: '39 1,2,3,4,5,6 * * *'
  workflow_dispatch: # Permette di avviarlo manualmente dal sito se necessario

jobs:
  run-bollettini:
    runs-on: ubuntu-latest
    permissions:
      contents: write # FONDAMENTALE: Serve per poter fare il commit dei file semaforo (.txt)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests groq

      - name: Sgancia il giorno della settimana
        id: check_day
        # Calcola il giorno attuale in fuso orario italiano (Europe/Rome)
        # 1 = Lunedì, 4 = Giovedì
        run: |
          SET_DAY=$(TZ="Europe/Rome" date +%u)
          echo "day=$SET_DAY" >> $GITHUB_OUTPUT

      - name: Esegui Aggiornamento Quotidiano
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        # Questo gira SEMPRE (tutti i giorni)
        run: python aggiornamento_meteo_quotidiano.py

      - name: Pausa anti-ingorgo API
        # Si attiva solo se è Lunedì (1), Giovedì (4) o se lo lanci a mano (workflow_dispatch)
        if: steps.check_day.outputs.day == '1' || steps.check_day.outputs.day == '4' || github.event_name == 'workflow_dispatch'
        run: sleep 30

      - name: Esegui Aggiornamento Medio Termine
        # Si attiva solo se è Lunedì (1), Giovedì (4) o se lo lanci a mano (workflow_dispatch)
        if: steps.check_day.outputs.day == '1' || steps.check_day.outputs.day == '4' || github.event_name == 'workflow_dispatch'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python aggiornamento_meteo_medio_termine.py

      - name: Salva i file semaforo (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add lock_quotidiano.txt || true
          git add lock_medio_termine.txt || true
          git commit -m "Aggiornamento semafori bollettini [skip ci]" || echo "Nessun aggiornamento semafori da committare"
          git push
