name: Invio Grafico Profilo ECMWF

on:
  schedule:
    # Esegue ogni 2 ore, per tutto il giorno.
    # Grazie al controllo MD5, non invierà nulla finché i dati ECMWF non si rinnovano.
    - cron: '15 */2 * * *'
  
  workflow_dispatch:

jobs:
  genera_e_invia_grafico:
    runs-on: ubuntu-latest
    permissions:
      contents: write # FONDAMENTALE: Consente di committare il file hash .txt

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script Grafico ECMWF
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python plot_ecmwf_telegram.py

      - name: Salva il file hash dei dati ECMWF (Commit & Push)
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultimo_hash_ecmwf.txt || true
          git commit -m "Aggiornamento hash dati ECMWF [skip ci]" || echo "Nessun nuovo run ECMWF, hash invariato"
          git push