name: Bollettino Agrometeo Orto

on:
  schedule:
    # 19:00 ora locale estiva = 17:00 UTC
    - cron: '0 17 * * *'
  workflow_dispatch: 

jobs:
  bollettino_orto:
    runs-on: ubuntu-latest

    steps:
      - name: Estrazione codice
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installa dipendenze
        run: pip install requests

      - name: Esegui Script Orto
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python stress_idrico_orto.py
