name: Aggiornamento meteo quotidiano

on:
  schedule:
    # Gira tutti i giorni alle 6:39 italiane estive (04:39 UTC)
    #- cron: '39 4 * * *'
  workflow_dispatch: 

jobs:
  scrivi_cronaca:
    runs-on: ubuntu-latest

    steps:
      - name: Estrazione del Codice Sorgente
        uses: actions/checkout@v3

      - name: Setup di Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Installazione librerie
        run: pip install -U google-generativeai requests

      - name: Genera e Invia Bollettino AI
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python aggiornamento_meteo_quotidiano.py
